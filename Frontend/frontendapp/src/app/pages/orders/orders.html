<h2>Orders</h2>

<button (click)="loadOrders()">Load</button>

<ul>
  <li *ngFor="let o of orders">
    {{o.id}} - {{o.productName}} - {{o.quantity}}
  </li>
</ul>

<hr>

<h3>Create Order</h3>

<input type="text" [(ngModel)]="userName" placeholder="User Name">
<input type="text" [(ngModel)]="productName" placeholder="Product Name">
<input type="number" [(ngModel)]="quantity" placeholder="Quantity">

<button (click)="createOrder()">Create</button>

<hr>

<h3>Last Response</h3>

<div *ngIf="lastResponse">
  <pre>{{ lastResponse | json }}</pre>
</div>
