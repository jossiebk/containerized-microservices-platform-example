<h2>Payments</h2>

<button (click)="loadPayments()">Load</button>

<ul>
  <li *ngFor="let p of payments">
    {{p.id}} - {{p.userName}} - {{p.amount}}
  </li>
</ul>

<hr>

<h3>Create Payment</h3>

<input type="text" [(ngModel)]="userName" placeholder="User Name">
<input type="number" [(ngModel)]="amount" placeholder="Amount">

<button (click)="createPayment()">Create</button>

<hr>

<h3>Last Response</h3>

<div *ngIf="lastResponse">
  <pre>{{ lastResponse | json }}</pre>
</div>
